version: 1
project: order-workflow-example

components:
  - id: client-order-ui
    kind: ui
    paths: [client/**]
    depends_on: [server-order-domain]
  - id: server-order-domain
    kind: domain
    paths: [server/**]
    depends_on: [database-order]
  - id: database-order
    kind: database
    paths: [db/**]
    depends_on: []

entities:
  - id: ENT-ORDER
    owner: commerce-platform
    locations:
      - kind: table
        selector: public.orders
      - kind: symbol
        selector: OrderStore
        path: client/order-store.js
        notes: No separate server-side Order class exists in this minimal example; order
          state is the public.orders row plus the plain objects flowing through
          server/submit-order.js and server/mark-order-paid.js.
  - id: ENT-PAYMENT
    owner: payments-platform
    locations:
      - kind: table
        selector: public.payments
        notes: No Payment class exists; payment state is accessed purely via SQL from
          server/mark-order-paid.js.

invariants:
  - id: INV-ORDER-001
    owner: commerce-platform
    locations:
      - kind: constraint
        selector: inv_paid_order_requires_matching_payment
        path: db/schema.sql
        notes: Deferred constraint trigger (assert_paid_order_invariant_for); raises
          ERRCODE 23514 with this constraint name, asserted directly in tests/order.test.js.
      - kind: constraint
        selector: inv_paid_order_payment_reference
        path: db/schema.sql
        notes: First-line-of-defense CHECK constraint on orders (payment_id set iff
          status=paid); necessary but not sufficient on its own.
      - kind: symbol
        selector: markOrderPaid
        path: server/mark-order-paid.js
      - kind: test
        selector: deferred database invariant rejects a paid order with rejected payment
        path: tests/order.test.js
    evidence_required:
      - Event-B invariant preservation proof
      - PostgreSQL integration test with mismatched payment
      - transaction boundary trace
  - id: INV-ORDER-002
    locations:
      - kind: query
        selector: submit guards status=draft before transition
        path: db/submit-order.sql
      - kind: query
        selector: mark-paid guards status=submitted before transition
        path: db/mark-order-paid.sql
    evidence_required:
      - transition graph has no outgoing terminal-state edges
      - direct writes outside registered command handlers are absent
  - id: INV-ORDER-003
    locations:
      - kind: column
        selector: public.orders.version
      - kind: query
        selector: submit increments version
        path: db/submit-order.sql
      - kind: query
        selector: mark-paid increments version
        path: db/mark-order-paid.sql
      - kind: ui-action
        selector: apply response only when version is monotonic
        path: client/order-store.js

commands:
  - id: CMD-ORDER-SUBMIT
    owner: commerce-platform
    locations:
      - kind: symbol
        selector: decodeSubmitOrder
        path: server/decoders.js
      - kind: symbol
        selector: submitOrder
        path: server/submit-order.js
      - kind: query
        selector: submit_order
        path: db/submit-order.sql
        notes: Authorization (actor.id = order.owner_id) is enforced inline in this
          query's WHERE clause, not via a separate authorization function.
      - kind: ui-action
        selector: submit
        path: client/order-store.js
      - kind: test
        selector: two concurrent submissions yield exactly one accepted transition
        path: tests/order.test.js
    evidence_required:
      - decoder dominates handler
      - authorization dominates database write
      - SQL WHERE contains old state and expected version
      - zero-row update maps to typed rejection
  - id: CMD-ORDER-MARK-PAID
    owner: payments-platform
    locations:
      - kind: symbol
        selector: markOrderPaid
        path: server/mark-order-paid.js
      - kind: symbol
        selector: withSerializableRetry
        path: server/transaction.js
      - kind: query
        selector: mark_order_paid
        path: db/mark-order-paid.sql

observations:
  - id: OBS-ORDER-DETAIL
    locations:
      - kind: symbol
        selector: applyAuthoritativeSnapshot
        path: client/order-store.js
    evidence_required:
      - tenant/owner predicate is present in the SQL or enforced RLS policy
      - sensitive fields are role-filtered
      - stale response cannot replace a newer version

framework_adapters:
  - id: express-pg-mobx
    framework: Express + node-postgres + MobX
    rules:
      endpoints:
        - app.METHOD(path, ...handlers)
        - router.METHOD(path, ...handlers)
      validators:
        - schema.parse
        - schema.safeParse
        - validateRequest
      authorization:
        - requirePermission
        - authorize
      decoders:
        - decodeSubmitOrder
      transaction_starts:
        - withTransaction
        - withSerializableRetry
        - client.query('BEGIN')
      transaction_commits:
        - client.query('COMMIT')
      transaction_rollbacks:
        - client.query('ROLLBACK')
      database_sinks:
        - client.query
        - pool.query
      external_effects:
        - fetch
        - axios.*
        - mailer.send
      ui_state_mutations:
        - runInAction
        - action
