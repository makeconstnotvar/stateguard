project:
  key: shipment-tracking-example
  name: Shipment Tracking Example

scanning:
  source_roots:
    - .
  excludes:
    - node_modules

review:
  max_files_per_unit: 80
  critical_paths:
    - db/**
    - server/**

specification:
  file: specification.yaml
  mappings: mappings.yaml
  event_b_project: event-b

integrations:
  semgrep:
    report: .stateguard/results/semgrep.sarif
    rules:
      - ../../config/semgrep/rules
  joern:
    output: .stateguard/results/joern
    languages:
      - JAVASCRIPT
  native_analyzers:
    - tool: eslint
      targets: [server, tests]
      report: .stateguard/results/eslint.sarif
